<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jeruk Konveksi - Professional Photobooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="screen active">
        <button id="btn-admin-login" class="subtle-btn">⚙️ Admin</button>
        <div class="hero">
            <h1 class="title">PHOTO BOOTH</h1>
            <p class="subtitle">Capture Your Moment</p>
            <div class="template-selector">
                <label>Choose Your Frame:</label>
                <select id="template-select"></select>
            </div>
            <button id="btn-start" class="btn-large primary">START SESSION</button>
        </div>
    </div>

    <div id="admin-screen" class="screen">
        <div class="admin-header">
            <h2>Admin Dashboard</h2>
            <button id="btn-admin-close" class="btn-small secondary">Back to Home</button>
        </div>
        <div class="admin-layout">
            <details class="admin-accordion">
                <summary>⚙️ System Settings (Timer, Drive, GitHub)</summary>
                <div class="admin-panel accordion-content">
                    <label>Session Timer (Seconds)</label>
                    <input type="number" id="session-time" placeholder="300">
                    <label>Google Drive Upload URL</label>
                    <input type="text" id="drive-url" placeholder="Apps Script URL">
                    <label>GitHub Repo (username/repo)</label>
                    <input type="text" id="github-repo" placeholder="user/repo">
                    <label>GitHub Token (PAT)</label>
                    <input type="password" id="github-token" placeholder="ghp_xxxx">
                    <button id="btn-save-settings" class="btn-small primary">Save All Settings</button>
                </div>
            </details>

            <div class="admin-panel template-panel">
                <h3>Template Builder</h3>
                <div class="template-controls">
                    <input type="text" id="tpl-name" placeholder="Frame Name">
                    <input type="file" id="tpl-file" accept="image/png">
                </div>
                <div class="canvas-container" id="admin-canvas-container">
                    <canvas id="admin-canvas"></canvas>
                </div>
                <ul id="slot-list" class="horizontal-list"></ul>
                <div class="admin-actions">
                    <button id="btn-save-tpl" class="btn-large primary">Save & Push Template</button>
                    <button id="btn-reset-tpl" class="btn-small danger">Reset Local</button>
                </div>
            </div>
        </div>
    </div>

    <div id="session-screen" class="screen">
        <div class="session-header">
            <div id="timer">05:00</div>
            <button id="btn-end-session" class="btn-small danger">End Early</button>
        </div>
        <div class="filter-controls">
            <button class="btn-filter active" data-filter="none">Normal</button>
            <button class="btn-filter" data-filter="grayscale(100%)">B & W</button>
            <button class="btn-filter" data-filter="sepia(0.8) contrast(1.2)">Vintage</button>
        </div>
        <div class="camera-container">
            <video id="camera-feed" autoplay playsinline></video>
            <div id="countdown-overlay"></div>
        </div>
        <button id="btn-take-photo" class="btn-large primary">TAKE PHOTO</button>
        <div class="gallery-strip" id="session-gallery"></div>
    </div>

    <div id="assignment-screen" class="screen">
        <div class="assignment-header">
            <h2>Assign Photos</h2>
            <p>Tap a photo, then tap a slot in the frame.</p>
        </div>
        <div class="assignment-layout">
            <div class="photo-picker" id="picker-gallery"></div>
            <div class="frame-preview-container">
                <div id="assignment-frame">
                    <img id="assign-frame-img" src="">
                    <div id="assign-slots-container"></div>
                </div>
            </div>
        </div>
        <button id="btn-generate" class="btn-large primary">GENERATE PHOTOSTRIP</button>
    </div>

    <div id="preview-screen" class="screen">
        <h2>Your Photostrip</h2>
        <div class="preview-layout">
            <div class="preview-container"><canvas id="final-canvas"></canvas></div>
            <div id="qr-container" class="qr-box hidden">
                <h3>Scan to Download</h3>
                <img id="qr-image" src="">
                <p id="qr-status-text">Uploading...</p>
            </div>
        </div>
        <div class="action-buttons">
            <button id="btn-retake" class="btn-large secondary">Retake All</button>
            <button id="btn-download" class="btn-large primary">UPLOAD & GET QR</button>
            <button id="btn-home" class="btn-large dark">SELESAI</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
